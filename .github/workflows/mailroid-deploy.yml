name: Deploy Mailroid

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          # NEXT_PUBLIC_API_URL is inlined into the client bundle at build time,
          # so it must be your real public API URL here, not localhost
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push DB migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-migrate:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-migrate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "Caddyfile"
          target: "~/mailroid"

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-api:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-web:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-migrate:latest

            docker network create mailroid-net || true

            # Postgres (pgvector) on the VPS, reachable only from other
            # containers on mailroid-net — no host port published.
            # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB and a matching
            # DATABASE_URL (host = mailroid-db) must be set in ~/mailroid/.env
            if ! docker inspect mailroid-db >/dev/null 2>&1; then
              docker run -d --restart unless-stopped \
                --network mailroid-net \
                --env-file ~/mailroid/.env \
                -v mailroid_pg_data:/var/lib/postgresql/data \
                --name mailroid-db \
                pgvector/pgvector:pg15
            fi

            echo "Waiting for Postgres to accept connections..."
            for i in $(seq 1 30); do
              docker exec mailroid-db pg_isready -U "$(grep -m1 '^POSTGRES_USER=' ~/mailroid/.env | cut -d= -f2-)" >/dev/null 2>&1 && break
              sleep 2
            done

            echo "Running DB migrations..."
            docker run --rm \
              --network mailroid-net \
              --env-file ~/mailroid/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-migrate:latest

            docker stop mailroid-api || true
            docker rm mailroid-api || true
            docker run -d --restart unless-stopped \
              --network mailroid-net \
              --env-file ~/mailroid/.env \
              --name mailroid-api \
              ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-api:latest

            docker stop mailroid-web || true
            docker rm mailroid-web || true
            docker run -d --restart unless-stopped \
              --network mailroid-net \
              --env-file ~/mailroid/.env \
              --name mailroid-web \
              ${{ secrets.DOCKERHUB_USERNAME }}/mailroid-web:latest

            docker stop mailroid-caddy || true
            docker rm mailroid-caddy || true
            docker run -d --restart unless-stopped \
              --network mailroid-net \
              -p 80:80 -p 443:443 \
              -v ~/mailroid/Caddyfile:/etc/caddy/Caddyfile \
              -v caddy_data:/data \
              -v caddy_config:/config \
              --name mailroid-caddy \
              caddy:2-alpine

            docker image prune -af
