name: Deploy Mailroid

# Manual DEPLOY pipeline. Ships already-built api + web images to the VPS and
# (re)starts the stack. It does NOT build — it pulls an image that the Build
# workflow already pushed to Docker Hub. Optionally applies DB migrations first
# when run_migrations=true, using the SAME image_tag so schema and code always
# come from one build.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (a commit SHA to pin an exact build, or "latest")'
        required: false
        default: latest
      run_migrations:
        description: 'Run DB migrations before deploying (uses the SAME image_tag)'
        type: boolean
        required: false
        default: false

# Never let two deploys (or a deploy and a migrate-triggered deploy) overlap.
concurrency:
  group: mailroid-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "Caddyfile"
          target: "~/mailroid"

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail

            TAG="${{ github.event.inputs.image_tag }}"
            RUN_MIGRATIONS="${{ github.event.inputs.run_migrations }}"
            REGISTRY="${{ secrets.DOCKERHUB_USERNAME }}"
            echo "Deploying tag: ${TAG} (run_migrations=${RUN_MIGRATIONS})"

            docker pull ${REGISTRY}/mailroid-api:${TAG}
            docker pull ${REGISTRY}/mailroid-web:${TAG}

            docker network create mailroid-net || true

            # Postgres (pgvector) on the VPS, reachable only from other
            # containers on mailroid-net — no host port published.
            # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB and a matching
            # DATABASE_URL (host = mailroid-db) must be set in ~/mailroid/.env
            if ! docker inspect mailroid-db >/dev/null 2>&1; then
              docker run -d --restart unless-stopped \
                --network mailroid-net \
                --env-file ~/mailroid/.env \
                -v mailroid_pg_data:/var/lib/postgresql/data \
                -p 127.0.0.1:5432:5432 \
                --name mailroid-db \
                pgvector/pgvector:pg15
            fi

            echo "Waiting for Postgres to accept connections..."
            for i in $(seq 1 30); do
              docker exec mailroid-db pg_isready -U "$(grep -m1 '^POSTGRES_USER=' ~/mailroid/.env | cut -d= -f2-)" >/dev/null 2>&1 && break
              sleep 2
            done

            # Migrations are opt-in. When enabled, run drizzle-kit migrate from
            # the SAME tag we're about to deploy, so the DB schema matches the
            # code we ship. If this fails, `set -e` aborts BEFORE any app
            # container is replaced, leaving the current app running.
            if [ "${RUN_MIGRATIONS}" = "true" ]; then
              echo "Running DB migrations (tag ${TAG})..."
              docker pull ${REGISTRY}/mailroid-migrate:${TAG}
              docker run --rm \
                --network mailroid-net \
                --env-file ~/mailroid/.env \
                ${REGISTRY}/mailroid-migrate:${TAG}
              echo "Migrations complete."
            else
              echo "Skipping DB migrations (run_migrations=false)."
            fi

            docker stop mailroid-api || true
            docker rm mailroid-api || true
            docker run -d --restart unless-stopped \
              --network mailroid-net \
              --env-file ~/mailroid/.env \
              --name mailroid-api \
              ${REGISTRY}/mailroid-api:${TAG}

            docker stop mailroid-web || true
            docker rm mailroid-web || true
            docker run -d --restart unless-stopped \
              --network mailroid-net \
              --env-file ~/mailroid/.env \
              --name mailroid-web \
              ${REGISTRY}/mailroid-web:${TAG}

            docker stop mailroid-caddy || true
            docker rm mailroid-caddy || true
            docker run -d --restart unless-stopped \
              --network mailroid-net \
              -p 80:80 -p 443:443 \
              -v ~/mailroid/Caddyfile:/etc/caddy/Caddyfile \
              -v caddy_data:/data \
              -v caddy_config:/config \
              --name mailroid-caddy \
              caddy:2-alpine

            docker image prune -af
